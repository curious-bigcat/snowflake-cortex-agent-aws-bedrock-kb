name: RETAIL_ANALYTICS_SV
description: Retail 360 analytics model for an Indian e-commerce platform. Covers
  customer demographics and segments, product catalog with pricing in INR, sales transactions
  across multiple channels, and customer behavioral events. Key metrics include revenue,
  order count, average order value, and customer counts across segments, regions,
  categories, and time periods.
