        right_column: PRODUCT_ID
  - name: CUSTOMER_EVENTS_TO_CUSTOMERS
    left_table: CUSTOMER_EVENTS
    right_table: CUSTOMERS
    join_type: inner
    relationship_type: many_to_one
    relationship_columns:
      - left_column: CUSTOMER_ID
        right_column: CUSTOMER_ID
verified_queries:
  - name: revenue_by_segment
    question: What is the revenue breakdown by customer segment?
    sql: SELECT c.CUSTOMER_SEGMENT, COUNT(DISTINCT t.CUSTOMER_ID) AS customer_count,
      SUM(t.TOTAL_AMOUNT) AS total_revenue, AVG(t.TOTAL_AMOUNT) AS avg_order_value
      FROM transactions AS t JOIN customers AS c ON t.CUSTOMER_ID = c.CUSTOMER_ID
      GROUP BY c.CUSTOMER_SEGMENT ORDER BY total_revenue DESC
    verified_at: 1776588809
    verified_by: Semantic Model Generator
  - name: top_categories_brands
    question: What are the top selling product categories and brands by total sales
      revenue?
    sql: SELECT p.CATEGORY, p.BRAND, COUNT(t.TRANSACTION_ID) AS order_count, SUM(t.TOTAL_AMOUNT)
      AS total_sales, AVG(p.RATING) AS avg_rating FROM transactions AS t JOIN products
      AS p ON t.PRODUCT_ID = p.PRODUCT_ID GROUP BY p.CATEGORY, p.BRAND ORDER BY total_sales
      DESC
    verified_at: 1776588809
    verified_by: Semantic Model Generator
  - name: revenue_by_channel_payment
    question: What is the revenue and order count by sales channel and payment method?
    sql: SELECT t.CHANNEL, t.PAYMENT_METHOD, COUNT(t.TRANSACTION_ID) AS order_count,
      SUM(t.TOTAL_AMOUNT) AS total_revenue FROM transactions AS t GROUP BY t.CHANNEL,
      t.PAYMENT_METHOD ORDER BY total_revenue DESC
    verified_at: 1776588809
    verified_by: Semantic Model Generator
  - name: revenue_by_state_city
    question: Which states and cities generate the most revenue?
    sql: SELECT c.STATE, c.CITY, COUNT(DISTINCT t.CUSTOMER_ID) AS customers, SUM(t.TOTAL_AMOUNT)
      AS revenue FROM transactions AS t JOIN customers AS c ON t.CUSTOMER_ID = c.CUSTOMER_ID
      GROUP BY c.STATE, c.CITY ORDER BY revenue DESC
    verified_at: 1776588809
    verified_by: Semantic Model Generator
  - name: monthly_revenue_trend
    question: What are the monthly trends for revenue, order volume, and average discount
      rates?
    sql: SELECT DATE_TRUNC('MONTH', t.TRANSACTION_DATE) AS month, COUNT(t.TRANSACTION_ID)
      AS orders, SUM(t.TOTAL_AMOUNT) AS revenue, AVG(t.DISCOUNT_PERCENT) AS avg_discount
      FROM transactions AS t GROUP BY month ORDER BY month
    verified_at: 1776588809
    verified_by: Semantic Model Generator
